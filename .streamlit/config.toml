# Dashboard theme — dark by default.
#
# A single dark theme (deep navy, Anthropic coral accent, Space Grotesk), NOT a
# [theme.light]/[theme.dark] pair: defining both makes Streamlit follow the
# visitor's OS setting, which showed the deployed app in light. The Settings menu
# (top-right) still offers a light/dark switch — light falls back to Streamlit's
# built-in light theme.
[theme]
base = "dark"
primaryColor = "#D97757"
backgroundColor = "#0B1220"
secondaryBackgroundColor = "#111827"
textColor = "#F8FAFC"
borderColor = "#2B3954"
font = "'Space Grotesk':https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
headingFont = "Space Grotesk"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400..600&display=swap"
baseFontSize = 14
showWidgetBorder = true
